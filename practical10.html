<!DOCTYPE html>
<html>
<head>
    <title>Webpage with Frames</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .left-frame {
            width: 40%;
            border-right: 2px solid #ccc;
        }
        .right-frame {
            width: 60%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
                <!-- Left frame: external webpage -->
        <div class="left-frame">
            <iframe src="https://www.wikipedia.org"></iframe>
        </div>

        <!-- Right frame: embedded Google Map -->
        <div class="right-frame">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14604.123456789!2d79.0882!3d21.1458!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bd4c7f123456789%3A0xabcdef123456789!2sNagpur%2C%20Maharashtra!5e0!3m2!1sen!2sin!4v1714720000000"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>
    </div>
</body>
</html>
